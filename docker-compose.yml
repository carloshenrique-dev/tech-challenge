services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mechanical_workshop_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=mechanical_workshop;Username=postgres;Password=postgres
      - Jwt__Secret=your-super-secret-key-here-at-least-32-characters
      - Jwt__Issuer=MechanicalWorkshop.API
      - Jwt__Audience=MechanicalWorkshop.Client
      - Jwt__ExpirationHours=8
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    image: postgres:16-alpine
    container_name: mechanical_workshop_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=mechanical_workshop
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: